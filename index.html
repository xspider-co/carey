<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>carey — hecho en el caribe. vestido en el mundo.</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>

/* ── RESET & BASE ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream:   #F5F0E8;
  --sand:    #E8D5B0;
  --deep:    #1B3A4B;
  --muted:   rgba(245,240,232,0.55);
  --faint:   rgba(245,240,232,0.25);
}

html { scroll-behavior: smooth; }

body {
  background: var(--cream);
  color: var(--deep);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── HERO ── */
.hero {
  position: relative;
  height: 100dvh;
  min-height: 600px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Background image */
.hero-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center 30%;
  background-repeat: no-repeat;
  z-index: 0;
}

/* Gradient overlay — dark at top/bottom, moderate in center
   keeps image beautiful while guaranteeing text legibility */
.hero-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom,
      rgba(10,16,14,0.55) 0%,
      rgba(10,16,14,0.38) 35%,
      rgba(10,16,14,0.42) 65%,
      rgba(10,16,14,0.60) 100%
    );
}

/* Content layer */
.hero-content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  text-align: center;
  padding: 0 1.5rem;
  width: 100%;
}

/* Wordmark — visible immediately, then animated */
.hero-wordmark {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(5rem, 17vw, 12rem);
  font-weight: 300;
  letter-spacing: 0.12em;
  color: #fff;
  line-height: 1;
  text-shadow: 0 2px 40px rgba(0,0,0,0.25);
  opacity: 1; /* always visible */
  animation: riseIn 2s cubic-bezier(0.16, 1, 0.3, 1) both 0.2s;
}

/* Tagline — always visible */
.hero-tagline {
  margin-top: 1.4rem;
  font-family: 'Inter', sans-serif;
  font-size: clamp(0.62rem, 1.8vw, 0.78rem);
  font-weight: 300;
  letter-spacing: 0.32em;
  color: rgba(255,255,255,0.92);
  text-transform: lowercase;
  text-shadow: 0 1px 12px rgba(0,0,0,0.35);
  opacity: 1;
  animation: fadeUp 1.6s ease both 0.9s;
}

/* Divider line */
.hero-rule {
  width: 30px;
  height: 0.5px;
  background: rgba(255,255,255,0.5);
  margin: 2.6rem auto;
  opacity: 1;
  animation: fadeIn 1.2s ease both 1.4s;
}

/* Email form */
.hero-form {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.85rem;
  width: 100%;
  max-width: 340px;
  opacity: 1;
  animation: fadeUp 1.4s ease both 1.6s;
}

.hero-input-wrap {
  position: relative;
  width: 100%;
}

.hero-input {
  width: 100%;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.55);
  border-radius: 0;
  padding: 0.9rem 1rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  font-weight: 300;
  letter-spacing: 0.15em;
  color: #fff;
  text-align: center;
  outline: none;
  transition: background 0.3s, border-color 0.3s;
  caret-color: #fff;
  -webkit-appearance: none;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

.hero-input::placeholder {
  color: rgba(255,255,255,0.65);
  letter-spacing: 0.2em;
  font-size: 0.7rem;
}

.hero-input:focus {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.9);
}

/* Animated underline on focus */
.focus-line {
  position: absolute;
  bottom: 0; left: 50%;
  width: 0; height: 0;
  transform: translateX(-50%);
}

.hero-btn {
  width: 100%;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.7);
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 0.65rem;
  font-weight: 400;
  letter-spacing: 0.38em;
  text-transform: lowercase;
  padding: 0.9rem 0;
  cursor: pointer;
  transition: background 0.3s, border-color 0.3s;
  -webkit-appearance: none;
  border-radius: 0;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

.hero-btn:hover {
  background: rgba(255,255,255,0.28);
  border-color: #fff;
}

.hero-btn:active { transform: scale(0.99); }

.hero-success {
  display: none;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem;
  font-style: italic;
  font-weight: 300;
  color: #fff;
  text-shadow: 0 1px 16px rgba(0,0,0,0.3);
  letter-spacing: 0.04em;
  line-height: 1.6;
  text-align: center;
  animation: fadeIn 0.9s ease forwards;
}

/* Scroll cue */
.scroll-cue {
  position: absolute;
  bottom: 2.5rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  z-index: 2;
  opacity: 0;
  animation: fadeIn 1s ease forwards 3s;
}

.scroll-cue span {
  font-size: 0.55rem;
  letter-spacing: 0.28em;
  text-transform: lowercase;
  color: rgba(255,255,255,0.3);
}

.scroll-tick {
  width: 0.5px;
  height: 36px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.35), transparent);
  animation: tickPulse 2.2s ease-in-out infinite;
}

@keyframes tickPulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.9; }
}

/* ── SECTION 2 — MANIFESTO ── */
.manifesto {
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 70vh;
  padding: 10rem 2rem;
  text-align: center;
}

.manifesto-inner {
  opacity: 0;
  transform: translateY(22px);
  transition: opacity 1.1s ease, transform 1.1s ease;
}

.manifesto-inner.visible {
  opacity: 1;
  transform: translateY(0);
}

.manifesto-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.2rem, 6vw, 4rem);
  font-weight: 300;
  line-height: 1.35;
  color: var(--deep);
  letter-spacing: 0.02em;
}

.manifesto-text em {
  font-style: italic;
  color: rgba(27,58,75,0.5);
}

/* ── SECTION 3 — DROP ── */
.drop {
  background: var(--cream);
  padding: 4rem 2rem 8rem;
  text-align: center;
}

.drop-rule {
  width: 40px;
  height: 0.5px;
  background: rgba(27,58,75,0.18);
  margin: 0 auto 5rem;
}

.drop-inner {
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 0.9s ease 0.1s, transform 0.9s ease 0.1s;
}

.drop-inner.visible {
  opacity: 1;
  transform: translateY(0);
}

.drop-label {
  font-family: 'Inter', sans-serif;
  font-size: 0.62rem;
  font-weight: 200;
  letter-spacing: 0.38em;
  text-transform: lowercase;
  color: rgba(27,58,75,0.38);
}

/* ── FOOTER ── */
footer {
  background: var(--cream);
  padding: 3.5rem 2rem;
  border-top: 0.5px solid rgba(27,58,75,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3rem;
}

.footer-ig,
.footer-copy {
  font-family: 'Inter', sans-serif;
  font-size: 0.58rem;
  font-weight: 200;
  letter-spacing: 0.22em;
  color: rgba(27,58,75,0.28);
  text-transform: lowercase;
  text-decoration: none;
  transition: color 0.3s;
}

.footer-ig:hover { color: rgba(27,58,75,0.6); }

/* ── ANIMATIONS ── */
@keyframes riseIn {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  .hero-wordmark { letter-spacing: 0.08em; }
  .hero-tagline  { letter-spacing: 0.25em; }
  .hero-form     { max-width: 290px; }
  .manifesto     { padding: 7rem 1.5rem; min-height: 55vh; }
  footer         { gap: 2rem; }
}

</style>
</head>
<body>

<!-- ── HERO ── -->
<section class="hero">
  <div class="hero-bg" id="heroBg"></div>

  <div class="hero-content">
    <h1 class="hero-wordmark">carey</h1>
    <p class="hero-tagline">hecho en el caribe &nbsp;·&nbsp; vestido en el mundo</p>

    <div class="hero-rule"></div>

    <!-- Email form -->
    <div class="hero-form" id="heroForm">
      <div class="hero-input-wrap">
        <input
          class="hero-input"
          type="email"
          id="heroEmail"
          placeholder="tu email"
          autocomplete="email"
          inputmode="email"
        />
        <div class="focus-line"></div>
      </div>
      <button class="hero-btn" id="heroBtn">unirse</button>
    </div>
    <p class="hero-success" id="heroSuccess">bienvenido.<br/>ya eres parte de algo.</p>
  </div>

  <div class="scroll-cue">
    <span>descubrir</span>
    <div class="scroll-tick"></div>
  </div>
</section>

<!-- ── MANIFESTO ── -->
<section class="manifesto">
  <div class="manifesto-inner" id="manifesto">
    <p class="manifesto-text">
      no es ropa.<br/><em>es cultura.</em>
    </p>
  </div>
</section>

<!-- ── DROP 01 ── -->
<section class="drop">
  <div class="drop-rule"></div>
  <div class="drop-inner" id="dropSection">
    <p class="drop-label">drop 01 &nbsp;·&nbsp; próximamente</p>
  </div>
</section>

<!-- ── FOOTER ── -->
<footer>
  <a class="footer-ig" href="https://instagram.com/carey.cu" target="_blank" rel="noopener">@carey.cu</a>
  <span class="footer-copy">© 2026</span>
</footer>

<script>
  // ── SET HERO BACKGROUND ──
  // Image is embedded as base64 below
  (function() {
    var bg = document.getElementById('heroBg');
    bg.style.backgroundImage = "url('background.jpg')";
  })();

  // ── SCROLL REVEAL ──
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.18 });

  document.querySelectorAll('#manifesto, #dropSection').forEach(function(el) {
    observer.observe(el);
  });

  // ── EMAIL SUBMIT ──
  function handleSubmit() {
    var input = document.getElementById('heroEmail');
    var btn   = document.getElementById('heroBtn');
    var val   = input.value.trim();

    // Basic validation
    if (!val || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
      input.style.borderBottomColor = 'rgba(200,130,90,0.7)';
      input.style.setProperty('--shake', '1');
      input.animate([
        {transform:'translateX(0)'},{transform:'translateX(-5px)'},
        {transform:'translateX(5px)'},{transform:'translateX(-3px)'},
        {transform:'translateX(3px)'},{transform:'translateX(0)'}
      ], { duration: 350, easing: 'ease-out' });
      setTimeout(function() { input.style.borderBottomColor = ''; }, 1400);
      return;
    }

    // Loading state
    btn.textContent = '···';
    btn.disabled = true;
    input.disabled = true;

    fetch('/api/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: val })
    })
    .then(function(res) { return res.json().then(function(data) { return { data: data }; }); })
    .then(function(result) {
      if (result.data && result.data.success) {
        showSuccess();
      } else {
        console.error('Subscribe error:', result.data);
        resetBtn(btn, input);
      }
    })
    .catch(function(err) {
      console.error('Error de red:', err);
      resetBtn(btn, input);
    });
  }

  function showSuccess() {
    document.getElementById('heroForm').style.display = 'none';
    var s = document.getElementById('heroSuccess');
    s.style.display = 'block';
  }

  function resetBtn(btn, input) {
    btn.textContent = 'unirse';
    btn.disabled = false;
    input.disabled = false;
    input.style.borderBottomColor = 'rgba(200,130,90,0.7)';
    setTimeout(function() { input.style.borderBottomColor = ''; }, 1400);
  }

  document.getElementById('heroBtn').addEventListener('click', handleSubmit);
  document.getElementById('heroEmail').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSubmit();
  });
</script>

</body>
</html>
